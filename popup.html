<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
  body { 
    width: 380px; 
    padding: 20px; 
    font-family: 'Segoe UI', system-ui, sans-serif; 
    background-color: #f8f9fa;
    margin: 0;
  }
  .header { display: flex; align-items: center; margin-bottom: 15px; }
  .header img { width: 30px; margin-right: 10px; }
  .header h2 { font-size: 18px; margin: 0; color: #1a73e8; }
  
  .label { font-size: 13px; color: #5f6368; font-weight: 600; margin-bottom: 8px; display: block; }
  
  textarea { 
    width: 100%; 
    height: 140px; 
    padding: 12px; 
    border: 1px solid #dadce0; 
    border-radius: 8px; 
    font-family: 'Consolas', monospace; 
    font-size: 12px; 
    resize: none;
    box-sizing: border-box;
    transition: border 0.2s;
  }
  textarea:focus { border: 2px solid #1a73e8; outline: none; }
  
  #inputText { background-color: #ffffff; }
  #output { background-color: #f1f3f4; color: #202124; }

  button { 
    width: 100%; 
    padding: 12px; 
    background-color: #1a73e8; 
    color: white; 
    border: none; 
    border-radius: 24px; 
    font-size: 14px; 
    font-weight: 600; 
    cursor: pointer; 
    margin-top: 15px;
    box-shadow: 0 1px 3px rgba(60,64,67,0.3);
    transition: background 0.2s;
  }
  button:hover { background-color: #1765cc; }
  button:active { background-color: #1659b9; }

  .footer { margin-top: 12px; text-align: center; font-size: 11px; color: #9aa0a6; }
</style>
</head>
<body>
  <div class="header">
    <h2>JSON Slicer for FAQ</h2>
  </div>

  <label class="label">📥 粘贴原始文本:</label>
  <textarea id="inputText" placeholder="从 Google Docs 复制内容并粘贴到这里..."></textarea>
  
  <label class="label" style="margin-top:15px;">🚀 生成的 JSON:</label>
  <textarea id="output" readonly placeholder="自动转换结果..."></textarea>
  
  <button id="copyBtn">复制结果到剪贴板</button>
  
  <div class="footer">由 AI 协作驱动的自动化工具</div>
  <script src="popup.js"></script>
</body>
</html>
